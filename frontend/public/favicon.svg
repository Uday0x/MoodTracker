<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1e293b"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Bar chart visualization -->
  <!-- Bar 1 (tall) -->
  <rect x="16" y="28" width="6" height="20" rx="2" fill="url(#grad1)" opacity="0.9"/>
  
  <!-- Bar 2 (medium) -->
  <rect x="26" y="36" width="6" height="12" rx="2" fill="url(#grad2)" opacity="0.8"/>
  
  <!-- Bar 3 (short) -->
  <rect x="36" y="42" width="6" height="6" rx="2" fill="#ec4899" opacity="0.85"/>
  
  <!-- Checkmark -->
  <path d="M 48 28 L 52 32 L 56 24" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Accent dots -->
  <circle cx="22" cy="20" r="1.5" fill="#3b82f6" opacity="0.6"/>
  <circle cx="42" cy="18" r="1.5" fill="#a855f7" opacity="0.6"/>
  <circle cx="50" cy="45" r="1.5" fill="#ec4899" opacity="0.6"/>
</svg>
